services:
  db:
    image: postgres:16-alpine
    container_name: tae_outreach_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tae_outreach
      POSTGRES_USER: tae_outreach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Australia/Melbourne
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default

  app:
    build: .
    container_name: tae_outreach
    restart: "no"
    depends_on:
      - db
    environment:
      DATABASE_DSN: postgresql://tae_outreach:${POSTGRES_PASSWORD}@db:5432/tae_outreach
      CM_API_KEY: ${CM_API_KEY}
      CM_LIST_ID: ${CM_LIST_ID}
      USER_AGENT: "TAE-Outreach/1.0 (contact: info@theautoexec.com)"
      RATE_LIMIT_RPS: "0.5"
      OOO_IMAP_HOST: ${OOO_IMAP_HOST:-mail.theautoexec.com}
      OOO_IMAP_PORT: ${OOO_IMAP_PORT:-993}
      OOO_IMAP_USER: ${OOO_IMAP_USER:-editor@theautoexec.com}
      OOO_IMAP_PASSWORD: ${OOO_IMAP_PASSWORD:-}
      OOO_IMAP_FOLDER: ${OOO_IMAP_FOLDER:-}
      TZ: Australia/Melbourne
    volumes:
      - ./outreach:/app/outreach
      - ./data:/app/data
    networks:
      - default

  # ── ControlTower cockpit API (TAE-2606-07 §2/§4) ─────────────────────────
  # Persistent, token-guarded read surface for the CT-TAE Outreach room. On the
  # shared webservices-tae network (reachable by CT server-to-server); NO host
  # publish. Same image as `app`, run as uvicorn instead of the CLI.
  api:
    build: .
    container_name: tae_outreach_api
    restart: unless-stopped
    depends_on:
      - db
    command: ["uvicorn", "outreach.api:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_DSN: postgresql://tae_outreach:${POSTGRES_PASSWORD}@db:5432/tae_outreach
      CT_OUTREACH_API_KEY: ${CT_OUTREACH_API_KEY}
      TZ: Australia/Melbourne
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./outreach:/app/outreach
    networks:
      - default
      - webservices-tae
    expose:
      - "8000"

volumes:
  pgdata:

networks:
  default:
    name: tae_outreach_net
  webservices-tae:
    external: true
